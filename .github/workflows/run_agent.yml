name: Super-Agent Pulse

on:
  workflow_dispatch:

jobs:
  run-alpha:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Updated to v5 for better mobile stability
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install fetchai coingecko-python pydantic

      - name: Run Alpha Manager
        env:
          CG_API_KEY: ${{ secrets.CG_API_KEY }}
          AGENT_SEED: ${{ secrets.AGENT_SEED }}
          AGENT_SEED_GAS: ${{ secrets.AGENT_SEED_GAS }}
          MASTER_WALLET_SEED: ${{ secrets.MASTER_WALLET_SEED }}
        run: python main.py # <--- LOWERCASE 'm' TO MATCH YOUR FILE
        
