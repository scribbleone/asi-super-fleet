name: Super-Agent Pulse 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'  # Runs every 20 minutes, 24/7

jobs:
  run-fleet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install 2026 Libraries
        run: pip install cosmpy uagents

      - name: Run 20-Agent Bureau
        env:
          AGENT_SEED: ${{ secrets.AGENT_SEED }}
        run: python main.py
        
