name: Super-Agent Pulse

on:
  workflow_dispatch: # Allows you to hit the manual "Run workflow" button

jobs:
  run-alpha:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install fetchai coingecko-python

      - name: Run Alpha Manager
        env:
          # This maps your GitHub Secrets to the Python script
          CG_API_KEY: ${{ secrets.CG_API_KEY }}
          AGENT_SEED: ${{ secrets.AGENT_SEED }}
          AGENT_SEED_GAS: ${{ secrets.AGENT_SEED_GAS }}
          MASTER_WALLET_SEED: ${{ secrets.MASTER_WALLET_SEED }}
        run: python Main.py
        
