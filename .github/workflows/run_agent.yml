name: Super-Agent Pulse

on:
  workflow_dispatch:

jobs:
  run-alpha:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install 2026 Libraries
        run: |
          pip install cosmpy coingecko-python

      - name: Run Alpha Manager
        env:
          CG_API_KEY: ${{ secrets.CG_API_KEY }}
          AGENT_SEED: ${{ secrets.AGENT_SEED }}
          AGENT_SEED_GAS: ${{ secrets.AGENT_SEED_GAS }}
          MASTER_WALLET_SEED: ${{ secrets.MASTER_WALLET_SEED }}
          AGENT_SEED_AUDIT: ${{ secrets.AGENT_SEED_AUDIT }} # <--- NEW LINE ADDED
        run: python main.py
        
